name: local fixture intentional failure
vars:
  base_url: http://127.0.0.1:8765
steps:
  - navigate:
      url: ${base_url}/index.html
  - assert:
      contract:
        kind: dom_text
        selector: h1
        contains: This Text Is Intentionally Missing
      evidence:
        snapshot:
          url: ${base_url}/index.html
          dom_text:
            h1: Playbook Fixture Home
  - navigate:
      url: ${base_url}/details.html
